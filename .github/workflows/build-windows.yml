name: Build Windows Executable

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'launcher.py'
      - 'cnpj_extractor/**'
      - 'requirements.txt'
      - 'company_email_extractor.spec'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build executable with PyInstaller
        run: |
          python -m PyInstaller company_email_extractor.spec --noconfirm

      - name: Create portable ZIP
        run: |
          Compress-Archive -Path dist\CompanyEmailExtractor\* -DestinationPath dist\CompanyEmailExtractor-Windows.zip

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CompanyEmailExtractor-Windows
          path: |
            dist/CompanyEmailExtractor-Windows.zip
            dist/CompanyEmailExtractor/
          retention-days: 90
